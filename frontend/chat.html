<!DOCTYPE html>
<html>
<head>
    <title>CareBot Chat</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', sans-serif;
        }

        body {
            background: linear-gradient(-45deg, #0f2027, #2c5364, #1abc9c, #3498db);
            background-size: 400% 400%;
            animation: gradientBG 10s ease infinite;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        body::before {
            content: "";
            position: fixed;
            width: 100%;
            height: 100%;
            background: url("carebotlogo.svg") no-repeat center;
            background-size: 450px;
            opacity: 0.05;
            z-index: -1;
        }

        .chat-layout {
            display: flex;
            height: 100vh;
        }

        .sidebar {
            width: 250px;
            background: rgba(255,255,255,0.95);
            padding: 20px;
            overflow-y: auto;
            border-right: 1px solid #ddd;
        }

        .recent-chat {
            background: white;
            padding: 12px;
            margin-bottom: 10px;
            border-radius: 8px;
            cursor: pointer;
            transition: 0.3s;
        }

        .recent-chat:hover {
            background: #e3f2fd;
        }

        .chat-section {
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        .messages {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
        }

        .message {
            max-width: 65%;
            padding: 12px 16px;
            border-radius: 15px;
            margin-bottom: 15px;
            animation: fadeInUp 0.3s ease forwards;
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .user {
            background: #8a8f00;
            color: white;
            margin-left: auto;
        }

        .bot {
            background: white;
            color: black;
            margin-right: auto;
        }

        .typing {
            width: 60px;
            display: flex;
            justify-content: space-between;
        }

        .typing span {
            width: 8px;
            height: 8px;
            background: gray;
            border-radius: 50%;
            animation: bounce 1s infinite;
        }

        .typing span:nth-child(2) { animation-delay: 0.2s; }
        .typing span:nth-child(3) { animation-delay: 0.4s; }

        @keyframes bounce {
            0%, 80%, 100% { transform: scale(0); }
            40% { transform: scale(1); }
        }

        .input-area {
            display: flex;
            align-items: center;
            padding: 15px;
            background: white;
            border-top: 1px solid #ddd;
        }

        .input-area input[type="text"] {
            flex: 1;
            padding: 12px;
            border-radius: 25px;
            border: 1px solid #ccc;
            margin: 0 10px;
        }

        .input-btn {
            background: #8a8f00;
            border: none;
            color: white;
            padding: 10px 12px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 16px;
        }

        .send-btn {
            background: #1f6ed4;
        }

        .preview-img {
            max-width: 150px;
            border-radius: 10px;
            margin-top: 5px;
        }

        @media (max-width: 768px) {
            .sidebar { display: none; }
        }
    </style>
</head>

<body>

<div class="chat-layout">

    <div class="sidebar">
        <h3>Recent Chats</h3>
        <div class="recent-chat">Health Tips</div>
        <div class="recent-chat">Diet Plan</div>
        <div class="recent-chat">Cold & Fever</div>
    </div>

    <div class="chat-section">

        <div class="messages" id="messages">
            <div class="message bot">
                Hello 👋 I am CareBot. Ask me anything!
            </div>
        </div>

        <div class="input-area">
            <input type="file" id="imageInput" hidden accept="image/*">
            <button class="input-btn" onclick="document.getElementById('imageInput').click()">+</button>
            <input type="text" id="userInput" placeholder="Ask your health query...">
            <button class="input-btn" onclick="startListening()">🎤</button>
            <button class="input-btn send-btn" onclick="sendMessage()">➤</button>
        </div>

    </div>
</div>

<script>

const token = localStorage.getItem("token");
if (!token) {
    window.location.href = "login.html";
}

let input = document.getElementById("userInput");
let messages = document.getElementById("messages");

input.addEventListener("keypress", function(e) {
    if (e.key === "Enter") {
        sendMessage();
    }
});

async function sendMessage() {

    let messageText = input.value.trim();
    if(messageText === "") return;

    let userMsg = document.createElement("div");
    userMsg.className = "message user";
    userMsg.innerText = messageText;
    messages.appendChild(userMsg);

    input.value = "";
    messages.scrollTop = messages.scrollHeight;

    showTyping();

    try {
        const response = await fetch("https://carebot-production-4690.up.railway.app", {
            method: "POST",
            headers: {
                "Content-Type": "application/json",
                "Authorization": "Bearer " + token
            },
            body: JSON.stringify({ message: messageText })
        });

        const data = await response.json();
        console.log("API RESPONSE:", data);
        removeTyping();

        let botMsg = document.createElement("div");
        botMsg.className = "message bot";
        botMsg.innerText = data.reply || "No reply from server";
        messages.appendChild(botMsg);

        messages.scrollTop = messages.scrollHeight;

    } catch (error) {
        removeTyping();
        let errorMsg = document.createElement("div");
        errorMsg.className = "message bot";
        errorMsg.innerText = "Server error. Please try again.";
        messages.appendChild(errorMsg);
        messages.scrollTop = messages.scrollHeight;
    }
}

function showTyping() {
    let typing = document.createElement("div");
    typing.className = "message bot typing";
    typing.id = "typing";
    typing.innerHTML = "<span></span><span></span><span></span>";
    messages.appendChild(typing);
}

function removeTyping() {
    let typing = document.getElementById("typing");
    if(typing) typing.remove();
}

document.getElementById("imageInput").addEventListener("change", function(event) {
    let file = event.target.files[0];
    if(!file) return;

    let reader = new FileReader();
    reader.onload = function(e) {
        let imgMsg = document.createElement("div");
        imgMsg.className = "message user";
        imgMsg.innerHTML = `<img src="${e.target.result}" class="preview-img">`;
        messages.appendChild(imgMsg);
        messages.scrollTop = messages.scrollHeight;
    };
    reader.readAsDataURL(file);
});

function startListening() {
    if (!('webkitSpeechRecognition' in window)) {
        alert("Speech recognition not supported in this browser");
        return;
    }

    let recognition = new webkitSpeechRecognition();
    recognition.lang = "en-US";
    recognition.start();

    recognition.onresult = function(event) {
        input.value = event.results[0][0].transcript;
    };
}

</script>

</body>
</html>
